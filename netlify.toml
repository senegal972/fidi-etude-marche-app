[build]
  publish   = "."
  functions = "netlify/functions"
  command   = "npm install --omit=dev --no-audit --no-fund"

# ── Timeout étendu pour les fonctions DVF (fetch sections + Etalab) ───────────
[functions."transactions"]
  timeout = 26

[functions."analyse"]
  timeout = 26

[functions."batiment"]
  timeout = 20

[functions."pappers"]
  timeout = 12

[functions."permis"]
  timeout = 15

[functions."loyers"]
  timeout = 20

[functions."facture"]
  timeout = 10

[functions."facture-html"]
  timeout = 5

[functions."fiscalite"]
  timeout = 15

[functions."vacance"]
  timeout = 15

[functions."delinquance"]
  timeout = 15

[functions."pdf-share"]
  timeout = 15

[functions."pdf-get"]
  timeout = 10

[functions."img-proxy"]
  timeout = 14

# ── Redirections API → Netlify Functions ──────────────────────────────────────
[[redirects]]
  from   = "/api/analyse"
  to     = "/.netlify/functions/analyse"
  status = 200

[[redirects]]
  from   = "/api/transactions"
  to     = "/.netlify/functions/transactions"
  status = 200

[[redirects]]
  from   = "/api/autocomplete"
  to     = "/.netlify/functions/autocomplete"
  status = 200

[[redirects]]
  from   = "/api/entreprise"
