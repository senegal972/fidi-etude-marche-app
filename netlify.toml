  to     = "/.netlify/functions/vacance"
  status = 200

[[redirects]]
  from   = "/api/delinquance"
  to     = "/.netlify/functions/delinquance"
  status = 200

[[redirects]]
  from   = "/api/pdf-share"
  to     = "/.netlify/functions/pdf-share"
  status = 200

# Lien public de téléchargement PDF (partage WhatsApp / lien direct)
[[redirects]]
  from   = "/api/download/*"
  to     = "/.netlify/functions/pdf-get"
  status = 200

[[redirects]]
  from   = "/api/img-proxy"
  to     = "/.netlify/functions/img-proxy"
  status = 200

# ── SPA fallback : toute URL non trouvée → index.html ─────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
