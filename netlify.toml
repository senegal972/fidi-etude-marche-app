[build]
  publish   = "."
  functions = "netlify/functions"
  command   = "npm install --omit=dev --no-audit --no-fund"

# ── Timeout étendu pour les fonctions DVF (fetch sections + Etalab) ───────────
[functions."transactions"]
  timeout = 26

[functions."analyse"]
  timeout = 26

[functions."batiment"]
  timeout = 20

[functions."pappers"]
  timeout = 12

[functions."permis"]
  timeout = 15

# ── Redirections API → Netlify Functions ──────────────────────────────────────
[[redirects]]
  from   = "/api/analyse"
  to     = "/.netlify/functions/analyse"
  status = 200

[[redirects]]
  from   = "/api/transactions"
  to     = "/.netlify/functions/transactions"
  status = 200

[[redirects]]
  from   = "/api/autocomplete"
  to     = "/.netlify/functions/autocomplete"
  status = 200

[[redirects]]
  from   = "/api/entreprise"
  to     = "/.netlify/functions/entreprise"
  status = 200

[[redirects]]
  from   = "/api/batiment"
  to     = "/.netlify/functions/batiment"
  status = 200

[[redirects]]
  from   = "/api/pappers"
  to     = "/.netlify/functions/pappers"
  status = 200

[[redirects]]
  from   = "/api/permis"
  to     = "/.netlify/functions/permis"
  status = 200

[[redirects]]
  from   = "/api/notion-save"
  to     = "/.netlify/functions/notion-save"
  status = 200

[[redirects]]
  from   = "/api/notion-list"
  to     = "/.netlify/functions/notion-list"
  status = 200

[[redirects]]
  from   = "/api/notion-get"
  to     = "/.netlify/functions/notion-get"
  status = 200

# ── SPA fallback : toute URL non trouvée → index.html ─────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
